services:
  db:
    image: postgres:15-alpine
    container_name: football_etl_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-football_data}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  adminer:
    image: adminer
    container_name: football_etl_adminer
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - db
  init:
    build: .
    container_name: football_etl_init
    command: python scripts/init_backfill.py
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-football_data}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
  scheduler:
    build: .
    container_name: football_etl_scheduler
    command: python run_scheduler.py
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-football_data}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FOTMOB_RATE_LIMIT: ${FOTMOB_RATE_LIMIT:-2.0}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
volumes:
  postgres_data:
