<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Football Data Pipeline{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: rgba(255, 255, 255, 0.1);
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent);
        }

        .nav-icon {
            margin-right: 0.75rem;
            width: 1.25rem;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 250px;
            /* Width of sidebar */
            padding: 2rem;
            max-width: 1600px;
        }

        /* Common Components */
        .card {
            background-color: var(--card-bg);
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        h1,
        h2,
        h3 {
            margin-top: 0;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        button.btn-primary {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        button.btn-primary:hover {
            background-color: var(--accent-hover);
        }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 1rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
            cursor: pointer;
        }

        /* Search bar */
        .search-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .search-input::placeholder { color: var(--text-secondary); }
        .search-input:focus { outline: none; border-color: var(--accent); }

        .search-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: #263045;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 1000;
            display: none;
            max-height: 280px;
            overflow-y: auto;
        }

        .search-result {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.75rem;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 0.82rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.15s;
        }

        .search-result:last-child { border-bottom: none; }
        .search-result:hover { background: rgba(59,130,246,0.12); }

        .search-type-badge {
            padding: 0.1rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.65rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .badge-player { background: rgba(34,197,94,0.2); color: var(--success); }
        .badge-team   { background: rgba(59,130,246,0.2); color: var(--accent); }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 1rem 0.5rem;
            }

            .nav-text,
            .logo span {
                display: none;
            }

            .sidebar .logo {
                justify-content: center;
            }

            .nav-link {
                justify-content: center;
            }

            .nav-icon {
                margin-right: 0;
            }

            .main-content {
                margin-left: 70px;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    <nav class="sidebar">
        <div class="logo">
            <span>⚽ Scout Pipeline</span>
        </div>

        <!-- Global Search -->
        <div class="search-wrapper">
            <input class="search-input" id="globalSearch" type="text" placeholder="🔍 Search players, teams…" autocomplete="off">
            <div class="search-dropdown" id="searchDropdown"></div>
        </div>

        <ul class="nav-links">
            <li>
                <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/pipeline" class="nav-link {% if active_page == 'pipeline' %}active{% endif %}">
                    <span class="nav-icon">⚙</span>
                    <span class="nav-text">Pipeline Monitor</span>
                </a>
            </li>
            <li>
                <a href="/coverage" class="nav-link {% if active_page == 'coverage' %}active{% endif %}">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Data Coverage</span>
                </a>
            </li>
            <li>
                <a href="/matches" class="nav-link {% if active_page == 'matches' %}active{% endif %}">
                    <span class="nav-icon">📅</span>
                    <span class="nav-text">Matches</span>
                </a>
            </li>
            <li>
                <a href="/teams" class="nav-link {% if active_page == 'teams' %}active{% endif %}">
                    <span class="nav-icon">🛡️</span>
                    <span class="nav-text">Teams</span>
                </a>
            </li>
            <li>
                <a href="/players" class="nav-link {% if active_page == 'players' %}active{% endif %}">
                    <span class="nav-icon">🏃</span>
                    <span class="nav-text">Players</span>
                </a>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Global Search Script -->
    <script>
    (function() {
        const input = document.getElementById('globalSearch');
        const dropdown = document.getElementById('searchDropdown');
        if (!input) return;

        let timer;
        input.addEventListener('input', () => {
            clearTimeout(timer);
            const q = input.value.trim();
            if (q.length < 3) { dropdown.style.display = 'none'; return; }
            timer = setTimeout(() => doSearch(q), 280);
        });

        input.addEventListener('blur', () => {
            setTimeout(() => { dropdown.style.display = 'none'; }, 200);
        });

        input.addEventListener('focus', () => {
            if (dropdown.children.length > 0) dropdown.style.display = 'block';
        });

        async function doSearch(q) {
            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                const results = await res.json();
                if (results.length === 0) {
                    dropdown.innerHTML = '<div style="padding: 0.75rem; color: var(--text-secondary); font-size: 0.82rem;">No results</div>';
                } else {
                    dropdown.innerHTML = results.map(r => `
                        <a class="search-result" href="${r.url}">
                            <span class="search-type-badge ${r.type === 'player' ? 'badge-player' : 'badge-team'}">
                                ${r.type === 'player' ? 'Player' : 'Team'}
                            </span>
                            <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${r.name}</span>
                            <span style="color: var(--text-secondary); font-size: 0.75rem;">${r.subtitle || ''}</span>
                        </a>
                    `).join('');
                }
                dropdown.style.display = 'block';
            } catch(e) {
                dropdown.style.display = 'none';
            }
        }
    })();
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
